<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Insights Hub</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=DM+Sans:wght@400;500;700;800;900&display=swap');

  :root {
    --bg: #ededea;
    --white: #ffffff;
    --black: #111111;
    --text: #111111;
    --text2: #555555;
    --text3: #888888;
    --text4: #aaaaaa;
    --border: #ddddd8;
    --tag-bg: #e4e4e0;
    --card-bg: #ffffff;
    --accent: #111111;
    --accent-soft: #f5f5f2;
    --red: #d44;
    --red-bg: #fceaea;
    --orange: #c87b1a;
    --orange-bg: #fdf3e2;
    --green: #1a8a5c;
    --green-bg: #e6f5ee;
    --blue: #3366cc;
    --blue-bg: #e8effa;
    --purple-bg: #c8b8d8;
    --lime-bg: #d4e4a0;
    --lavender-bg: #b8c8e8;
    --radius: 20px;
    --radius-sm: 14px;
    --radius-xs: 10px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, 'PingFang SC', 'Helvetica Neue', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.55;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ===== HEADER ===== */
  .header {
    padding: 0 48px;
    height: 72px;
    display: flex; align-items: center; justify-content: space-between;
    max-width: 1400px; margin: 0 auto;
  }

  .nav-cluster {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .nav-links {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 5px;
    background: rgba(255,255,255,0.6);
    border: 1px solid var(--border);
    border-radius: 999px;
    backdrop-filter: blur(12px);
  }
  .nav-link {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    height: 40px;
    font-size: 14px;
    font-weight: 600;
    color: var(--text2);
    text-decoration: none;
    cursor: pointer;
    border: none;
    background: transparent;
    padding: 0 22px;
    border-radius: 999px;
    font-family: inherit;
    line-height: 1;
    transition: all 0.2s;
  }
  .nav-link:hover { color: var(--black); background: rgba(0,0,0,0.04); }
  .nav-link.active {
    background: var(--black);
    color: #fff;
  }

  .header-right {
    display: flex; align-items: center; gap: 12px;
  }

  .date-nav { display: flex; align-items: center; gap: 6px; }

  .date-nav button {
    background: var(--white);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 9px 20px; border-radius: 100px; cursor: pointer;
    font-size: 13px; font-weight: 500;
    font-family: inherit;
    transition: all 0.2s;
  }
  .date-nav button:hover {
    background: var(--black);
    color: var(--white);
    border-color: var(--black);
  }
  .date-nav button:active { transform: scale(0.96); }
  .date-nav button.go-this-week {
    background: var(--black); color: var(--white); border-color: var(--black);
    padding: 9px 16px; font-size: 12px;
  }
  .date-nav button.go-this-week:hover { opacity: 0.8; }

  .date-nav .current-date {
    font-size: 13px; font-weight: 600; padding: 0 14px;
    min-width: 120px; text-align: center; color: var(--text);
  }

  .voice-btn {
    width: 40px;
    height: 40px;
    flex: 0 0 40px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: rgba(255,255,255,0.6);
    border: 1px solid var(--border);
    color: var(--text2);
    padding: 0;
    border-radius: 999px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    font-family: inherit;
    line-height: 1;
    transition: all 0.2s;
    backdrop-filter: blur(12px);
  }

  .voice-btn:hover:not(:disabled) {
    color: var(--black);
    background: rgba(255,255,255,0.9);
    border-color: rgba(17,17,17,0.12);
  }

  .voice-btn:disabled {
    opacity: 0.45;
    cursor: not-allowed;
  }

  .voice-btn.is-playing {
    background: var(--black);
    color: var(--white);
    border-color: var(--black);
  }

  .voice-btn:focus-visible {
    outline: 2px solid rgba(17,17,17,0.18);
    outline-offset: 2px;
  }

  .voice-btn-icon {
    font-size: 14px;
    line-height: 1;
    color: var(--black);
  }

  .voice-btn.is-playing .voice-btn-icon {
    color: var(--white);
  }

  .voice-btn-label {
    display: none;
  }

  /* ===== MAIN ===== */
  .main {
    max-width: 1400px; margin: 0 auto;
    padding: 20px 48px 60px;
  }

  /* ===== HERO SECTION ===== */
  .hero {
    margin-bottom: 288px;
  }

  .hero-left {
    display: flex; flex-direction: column;
    justify-content: center;
    padding: 160px 0;
  }

  .hero-title {
    font-family: 'DM Sans', sans-serif;
    font-size: 48px;
    font-weight: 900;
    line-height: 1.1;
    letter-spacing: -2px;
    color: var(--black);
    margin-bottom: 24px;
    white-space: nowrap;
  }

  .hero-desc {
    font-size: 15px; line-height: 1.75;
    color: var(--text2); max-width: 800px;
    margin-bottom: 32px;
  }

  .hero-stats {
    display: flex; gap: 40px; align-items: flex-end;
  }
  .hero-stats-right {
    margin-left: auto;
  }
  .blog-entry-btn {
    display: inline-flex; align-items: center; gap: 12px;
    background: none; color: var(--black);
    border: none; border-radius: 40px;
    padding: 0; font-size: 14px; font-weight: 600;
    font-family: 'Inter', sans-serif;
    cursor: pointer; transition: all 0.2s;
    white-space: nowrap;
    margin-bottom: 40px;
    align-self: flex-start;
    outline: none;
  }
  .blog-entry-btn:focus, .blog-entry-btn:focus-visible {
    outline: none;
    box-shadow: none;
  }
  .blog-entry-btn:hover {
    opacity: 0.8;
  }
  .blog-entry-btn .blog-entry-play-circle {
    width: 48px; height: 48px;
    min-width: 48px; min-height: 48px;
    max-width: 48px; max-height: 48px;
    border-radius: 50%;
    background: #222;
    border: none;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    font-size: 18px;
    color: #fff;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    overflow: hidden;
    line-height: 1;
  }
  .blog-entry-btn .blog-entry-text {
    display: flex; flex-direction: column; gap: 1px;
    text-align: left;
  }
  .blog-entry-btn .blog-entry-title {
    font-size: 14px; font-weight: 700; color: var(--black);
  }
  .blog-entry-btn .blog-entry-subtitle {
    font-size: 12px; font-weight: 400; color: var(--text2);
  }
  @keyframes blog-entry-pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }
  .blog-entry-btn .blog-entry-eq {
    display: inline-flex; align-items: flex-end; gap: 2px; height: 14px;
  }
  .blog-entry-btn .blog-entry-eq span {
    display: inline-block; width: 3px; background: #fff; border-radius: 2px;
    animation: blog-eq-bar 0.8s ease-in-out infinite alternate;
  }
  .blog-entry-btn .blog-entry-eq span:nth-child(1) { height: 6px; animation-delay: 0s; }
  .blog-entry-btn .blog-entry-eq span:nth-child(2) { height: 10px; animation-delay: 0.15s; }
  .blog-entry-btn .blog-entry-eq span:nth-child(3) { height: 8px; animation-delay: 0.3s; }
  .blog-entry-btn .blog-entry-eq span:nth-child(4) { height: 12px; animation-delay: 0.1s; }
  @keyframes blog-eq-bar {
    0% { transform: scaleY(0.4); }
    100% { transform: scaleY(1); }
  }
  .hero-stat-num {
    font-family: 'DM Sans', sans-serif;
    font-size: 36px; font-weight: 900; color: var(--black);
    letter-spacing: -1.5px;
    line-height: 1;
  }
  .hero-stat-label {
    font-size: 13px; color: var(--text3); margin-top: 6px; font-weight: 500;
  }

  /* ===== TAB NAV ===== */
  .tab-nav {
    display: flex; gap: 8px; margin-bottom: 36px;
  }

  .tab-btn {
    padding: 10px 24px; border: none;
    background: transparent;
    color: var(--text3); font-size: 14px; font-weight: 500;
    border-radius: 100px; cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }
  .tab-btn:hover { color: var(--text); background: rgba(0,0,0,0.04); }
  .tab-btn.active {
    background: var(--black);
    color: var(--white);
    font-weight: 600;
  }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* ===== SECTION ===== */
  .section { margin-bottom: 40px; }

  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 24px;
  }
  .section-title {
    font-family: 'DM Sans', sans-serif;
    font-size: 28px; font-weight: 900; color: var(--black);
    letter-spacing: -1px;
  }

  .section-badge {
    font-size: 12px;
    background: var(--tag-bg);
    color: var(--text2);
    padding: 6px 16px; border-radius: 100px;
    font-weight: 600;
  }

  /* ===== INSIGHT CARDS ===== */
  .insights-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 20px;
  }

  .insight-card {
    background: linear-gradient(180deg, rgba(255,255,255,0.98) 0%, rgba(252,250,246,0.96) 100%);
    border-radius: var(--radius);
    padding: 28px;
    border: 1px solid rgba(17,17,17,0.08);
    box-shadow: 0 12px 32px rgba(17,17,17,0.05);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    cursor: default;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }
  .insight-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 18px 40px rgba(17,17,17,0.08);
  }

  .insight-card .insight-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }
  .insight-card .card-label {
    display: inline-flex;
    align-items: center;
    align-self: flex-start;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.6px;
    text-transform: uppercase;
    color: var(--black);
    background: rgba(17,17,17,0.06);
    padding: 6px 12px;
    border-radius: 100px;
  }
  .insight-card .insight-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .insight-card .insight-meta-item {
    display: inline-flex;
    align-items: center;
    min-height: 26px;
    padding: 0 10px;
    border-radius: 999px;
    background: rgba(255,255,255,0.92);
    border: 1px solid rgba(17,17,17,0.08);
    color: var(--text3);
    font-size: 11px;
    font-weight: 600;
  }
  .insight-card h3 {
    font-family: 'DM Sans', sans-serif;
    font-size: 22px;
    font-weight: 800;
    line-height: 1.35;
    color: var(--black);
    letter-spacing: -0.5px;
    margin: 0;
  }
  .insight-card .insight-quicktake {
    background: rgba(17,17,17,0.04);
    border: 1px solid rgba(17,17,17,0.08);
    border-radius: var(--radius-sm);
    padding: 16px 18px;
  }
  .insight-card .section-label {
    font-size: 11px;
    color: var(--text3);
    font-weight: 700;
    margin-bottom: 8px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .insight-card .insight-quicktake p {
    font-size: 15px;
    line-height: 1.7;
    color: var(--black);
    font-weight: 700;
  }
  .insight-card .insight-sections {
    display: grid;
    grid-template-columns: 1fr;
    gap: 12px;
  }
  .insight-card .insight-section {
    display: flex;
    flex-direction: column;
    padding: 16px 18px;
    border-radius: var(--radius-sm);
    background: rgba(255,255,255,0.78);
    border: 1px solid rgba(17,17,17,0.08);
  }
  .insight-card .insight-points {
    list-style: none;
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .insight-card .insight-points li {
    position: relative;
    padding-left: 16px;
    font-size: 13px;
    line-height: 1.75;
    color: var(--text2);
  }
  .insight-card .insight-points li::before {
    content: '';
    position: absolute;
    left: 0;
    top: 9px;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--black);
    opacity: 0.72;
  }

  .insight-card .implication {
    background: rgba(245,239,228,0.72);
    border-left: 3px solid var(--black);
  }
  .insight-card .implication .section-label,
  .insight-card .implication .insight-points li {
    color: var(--black);
  }
  .insight-card .insight-footer {
    margin-top: auto;
    display: flex;
    flex-direction: column;
    gap: 12px;
    padding-top: 16px;
    border-top: 1px solid rgba(17,17,17,0.08);
  }
  .insight-card .insight-footer .source-links {
    margin-top: 0;
    padding-top: 0;
    border-top: none;
  }

  .tags { display: flex; flex-wrap: wrap; gap: 8px; }
  .tag {
    font-size: 12px; padding: 5px 14px; border-radius: 100px;
    background: var(--tag-bg);
    color: var(--text3); font-weight: 500;
    transition: all 0.2s;
  }
  .tag:hover {
    background: var(--black);
    color: var(--white);
  }

  /* ===== SOURCE LINKS ===== */
  .source-links {
    display: flex; flex-wrap: wrap; gap: 8px;
    margin-top: 20px; padding-top: 18px;
    border-top: 1px solid var(--bg);
  }
  .source-link {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 12px; color: var(--text3); font-weight: 500;
    text-decoration: none;
    padding: 6px 16px; border-radius: 100px;
    background: var(--accent-soft);
    transition: all 0.2s;
    cursor: pointer;
  }
  .source-link:hover {
    background: var(--black);
    color: var(--white);
  }
  .source-link::before {
    content: '';
    display: inline-block;
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--text4);
    transition: background 0.2s;
  }
  .source-link:hover::before { background: var(--white); }
  .source-link-icon {
    font-size: 11px; transition: transform 0.2s;
  }
  .source-link:hover .source-link-icon { transform: translateX(2px); }

  /* ===== DEMAND CARDS ===== */
  .demand-list { display: flex; flex-direction: column; gap: 16px; }

  .demand-card {
    background: var(--white);
    border-radius: var(--radius);
    padding: 32px;
    display: grid; grid-template-columns: 1fr auto; gap: 24px;
    transition: transform 0.3s ease;
  }
  .demand-card:hover { transform: translateY(-3px); }

  .demand-card h3 {
    font-family: 'DM Sans', sans-serif;
    font-size: 18px; font-weight: 800; margin-bottom: 18px;
    color: var(--black); letter-spacing: -0.3px;
  }
  .demand-meta { display: flex; flex-direction: column; gap: 16px; }

  .demand-field { font-size: 14px; line-height: 1.75; }
  .demand-field .label {
    font-size: 11px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 1.5px; margin-bottom: 6px;
    display: flex; align-items: center; gap: 8px;
  }
  .demand-field .label::before {
    content: '';
    display: inline-block;
    width: 6px; height: 6px; border-radius: 50%;
  }
  .demand-field.pain .label { color: var(--red); }
  .demand-field.pain .label::before { background: var(--red); }
  .demand-field.opp .label { color: var(--green); }
  .demand-field.opp .label::before { background: var(--green); }
  .demand-field.evi .label { color: var(--blue); }
  .demand-field.evi .label::before { background: var(--blue); }
  .demand-field p { color: var(--text2); }

  .priority-badge {
    align-self: flex-start; padding: 8px 20px; border-radius: 100px;
    font-size: 12px; font-weight: 600; white-space: nowrap;
    letter-spacing: 0.5px;
  }
  .priority-high {
    background: var(--red-bg); color: var(--red);
  }
  .priority-mid {
    background: var(--orange-bg); color: var(--orange);
  }

  /* ===== NEWS CARDS ===== */
  .news-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px;
  }

  .news-card {
    background: var(--white);
    border-radius: var(--radius);
    padding: 28px;
    transition: transform 0.3s ease;
    display: flex; flex-direction: column;
  }
  .news-card:hover { transform: translateY(-3px); }

  .news-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }

  .news-category {
    font-size: 11px; padding: 5px 14px; border-radius: 100px;
    background: var(--tag-bg); color: var(--text2); font-weight: 600;
  }

  .news-relevance { font-size: 11px; font-weight: 600; }
  .relevance-high { color: var(--red); }
  .relevance-mid { color: var(--orange); }

  .news-card h3 {
    font-family: 'DM Sans', sans-serif;
    font-size: 17px; font-weight: 800; margin-bottom: 10px;
    line-height: 1.4; color: var(--black); letter-spacing: -0.3px;
  }
  .news-card .summary {
    font-size: 13px; color: var(--text2); line-height: 1.8; flex: 1;
  }

  .news-source {
    font-size: 12px; color: var(--text3); margin-top: 18px;
    padding-top: 16px; border-top: 1px solid var(--bg);
    display: flex; align-items: center; justify-content: space-between;
  }
  .news-source a {
    color: var(--white); text-decoration: none; font-weight: 600;
    font-size: 12px;
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--black);
    padding: 7px 18px; border-radius: 100px;
    transition: all 0.2s;
  }
  .news-source a:hover { gap: 10px; background: #333; }
  .news-source a::after { content: '\2192'; font-size: 14px; }
  .news-card-clickable { cursor: pointer; }
  .news-card-clickable:hover { transform: translateY(-3px); }

  /* ===== LOADING ===== */
  .loading { text-align: center; padding: 120px; color: var(--text3); }
  .loading .spinner {
    width: 32px; height: 32px;
    border: 2px solid var(--border);
    border-top-color: var(--black);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ===== EMPTY STATE ===== */
  .empty-state {
    text-align: center; padding: 120px;
    color: var(--text3);
    background: var(--white);
    border-radius: var(--radius);
  }
  .empty-state .icon {
    font-family: 'DM Sans', sans-serif;
    font-size: 32px; color: var(--text4); margin-bottom: 16px;
  }
  .empty-state p { font-size: 14px; font-weight: 400; line-height: 1.8; }

  /* ===== KNOWLEDGE BASE ===== */
  .knowledge-header { margin-bottom: 32px; }
  .knowledge-title {
    font-family: 'DM Sans', sans-serif;
    font-size: 36px; font-weight: 900; color: var(--black);
    letter-spacing: -1.5px; line-height: 1.1; margin: 0 0 12px;
  }
  .knowledge-desc {
    font-size: 15px; color: var(--text3); line-height: 1.6; margin: 0;
  }

  .knowledge-input-area { margin-bottom: 48px; }
  .knowledge-input-row {
    display: flex; gap: 12px; align-items: stretch;
  }
  .knowledge-url-input {
    flex: 1; height: 48px; padding: 0 18px;
    font-size: 15px; font-family: inherit;
    border: 1.5px solid rgba(17,17,17,0.12);
    border-radius: var(--radius);
    background: var(--white);
    color: var(--black);
    outline: none;
    transition: border-color 0.2s;
  }
  .knowledge-url-input:focus {
    border-color: var(--black);
  }
  .knowledge-url-input::placeholder {
    color: var(--text4);
  }

  .knowledge-analyze-btn {
    height: 48px; padding: 0 28px;
    font-size: 15px; font-weight: 700; font-family: inherit;
    background: var(--black); color: var(--white);
    border: none; border-radius: var(--radius);
    cursor: pointer;
    transition: opacity 0.2s;
    white-space: nowrap;
    display: flex; align-items: center; justify-content: center;
  }
  .knowledge-analyze-btn:hover { opacity: 0.85; }
  .knowledge-analyze-btn:disabled { opacity: 0.45; cursor: not-allowed; }

  .analyze-spinner {
    display: inline-block; width: 14px; height: 14px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: var(--white);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    margin-right: 8px; vertical-align: middle;
  }

  .knowledge-error {
    margin-top: 10px; padding: 10px 16px;
    font-size: 13px; color: #c0392b;
    background: rgba(192,57,43,0.06);
    border-radius: var(--radius-sm);
  }

  .knowledge-cards-header {
    font-family: 'DM Sans', sans-serif;
    font-size: 22px; font-weight: 800; color: var(--black);
    margin-bottom: 20px; letter-spacing: -0.5px;
  }
  .knowledge-cards {

loquent Android 版发布后的默认键盘功能，评估对输入法产品的影响；同时调研端侧 ASR 模型在用户访谈转写场景的可用性。","tags":["端侧AI","语音输入","Google Gemma","离线能力"],"sourceUrls":[{"name":"TechCrunch 报道","url":"https://techcrunch.com/2026/04/06/google-quietly-releases-an-offline-first-ai-dictation-app-on-ios/"},{"name":"9to5Google 功能解析","url":"https://9to5google.com/2026/04/06/google-ai-edge-eloquent-app/"}]}]},"competitive":{"label":"竞品分析","summary":"AI 设计工具的竞争格局正在被「免费策略」和「平台化」重塑。Google Stitch 免费搅局，Figma 深度嵌入 AI，Adobe 开放多模型——三巨头的路线分化越来越明显。","items":[{"title":"Figma AI vs Google Stitch vs Adobe Firefly：2026 年设计工具三国杀路线分化","source":"2026-04-03 / Webdesign-Inspiration + 多源综合","sourceDetail":"Figma 路线：原生嵌入（零上下文切换，设计系统感知最强）；Google 路线：免费 + 双模式（Flash 高速 / Pro 高质量）+ Figma 导出；Adobe 路线：多模型开放（25+ 模型可切换）+ 商业安全（内容凭证）","insight":"三家的差异化已经清晰：Figma 赌「设计系统深度绑定」（你的组件库越深，越离不开 Figma Make），Google 赌「免费 + 低门槛」抢非设计师市场，Adobe 赌「多模型开放 + 版权安全」锁企业用户。对竞品分析的方法论启示：不要只看功能对比表，要看各家在「锁定用户」维度的战略意图。","action":"更新竞品分析框架，增加「用户锁定机制」维度（数据绑定/生态依赖/切换成本），用这个视角重新审视输入法赛道的竞品策略。","tags":["竞品分析","Figma","Google Stitch","Adobe","战略分化"],"sourceUrls":[{"name":"7 AI Tools Changing UI/UX Design","url":"https://www.webdesign-inspiration.com/article/7-ai-tools-that-are-actually-changing-ui-ux-design-in-2026/"},{"name":"Google Stitch vs Figma 对比","url":"https://www.nxcode.io/zh/resources/news/google-stitch-vs-figma-ai-design-comparison-2026"},{"name":"AI 设计工具全景指南","url":"https://pixso.cn/designskills/2026-ai-design-tools-guide/"}]},{"title":"Flowstep 和 UXbot 崛起：新势力在「PRD→完整产品原型」赛道抢跑","source":"2026-04-02 ~ 2026-04-03 / SegmentFault + Webdesign-Inspiration","sourceDetail":"Flowstep：无限画布 + 多屏生成 + React/TS/Tailwind 代码导出，主打用户旅程设计；UXbot：唯一支持 Android/iOS 原生代码导出，含可视化流程画布","insight":"Figma/Adobe/Google 在争「设计层」，但 Flowstep 和 UXbot 在争「从需求到代码」的全链路。这意味着「设计稿输出」的竞争维度已经扩大到「是否能直接交付可运行代码」。做竞品分析时要同时关注上下游的替代威胁。","action":"把 Flowstep 的「导入 PRD → 生成多页面原型 → 导出 React 代码」流程跑一遍，评估是否能替代我们当前的线框图→设计稿→前端切图三步流程。","tags":["Flowstep","UXbot","全链路","PRD到代码"],"sourceUrls":[{"name":"SegmentFault 测评","url":"https://segmentfault.com/a/1190000047690857"},{"name":"Flowstep 官网","url":"https://www.flowstep.ai/"}]},{"title":"AI 竞品分析工具自身也在进化：从人工截图到 AI 自动追踪","source":"2026-04 / AskTodo + Kearney AI Trends","sourceDetail":"AI 竞品分析工具可自动监控竞品网站变化、定价调整、功能更新，将竞品分析从「季度报告」变成「实时情报流」","insight":"做竞品分析这件事本身也在被 AI 重塑。手动截图、安装竞品 App 逐个走查的方式效率太低。应该建立自动化竞品监控 pipeline，让 AI 帮你做「变化检测 + 结构化总结」。","action":"评估 AI 竞品监控工具（如 Crayon、Klue）的能力，考虑将其接入团队的竞品追踪流程，至少在 Web 端竞品实现自动化变化检测。","tags":["竞品监控","自动化","AI工具","情报流"],"sourceUrls":[{"name":"AskTodo AI竞品分析","url":"https://asktodo.ai/blog/ai-competitive-analysis-2026"},{"name":"Kearney AI趋势报告","url":"https://www.kearney.com/service/digital-analytics/article/kearney-ai-trends-report-2026"}]}]},"user_research":{"label":"用户调研","summary":"UX 研究的「民主化」加速——70% 的设计师在做研究，AI 让研究周转速度提升 57%。但 74% 的人仍认为需要人工审查，AI 不是替代研究者，而是让每个人都能做研究。","items":[{"title":"2026 UX 研究三大趋势：民主化、速度压力、AI 提效 32%","source":"2026-03-30 / LogRocket Blog (基于 Maze 2025 报告)","sourceDetail":"83% 组织报告可用性提升；70% 的设计师在做研究（高于 61%）；63% 的团队最大痛点是「没时间」；AI 在研究中的使用激增 32%，主要用于数据分析（74%）和转录（58%）","insight":"研究民主化不是口号——数据显示 PM 参与研究的比例已从 38% 升至 42%，设计师做研究的比例到了 70%。这意味着研究工具的设计应该面向「非专业研究者」，而不是只服务研究员。对应到我们的场景：AI Insights Hub 的设计周报本身就是「研究民主化」的实践——让不做研究的人也能获得结构化洞察。","action":"① 在 AI Insights Hub 的 Design 页面增加「一句话导读」降低阅读门槛；② 整理这份报告的核心数据，作为团队推动「人人做研究」文化的支撑材料。","tags":["UX研究趋势","研究民主化","AI提效","速度压力"],"sourceUrls":[{"name":"LogRocket 趋势分析","url":"https://blog.logrocket.com/ux-design/ux-research-trends-2026/"},{"name":"Maze 报告","url":"https://maze.co/resources/ux-research-report/"}]},{"title":"AI UX 研究工具爆发：18 款工具覆盖访谈、测试、问卷、行为分析全链路","source":"2026-03-19 / BuildBetter.AI","sourceDetail":"横跨用户访谈（Looppanel、Dovetail）、可用性测试（Maze、UserTesting）、问卷（Typeform AI）、行为分析（FullStory、Hotjar AI）四大类共 18 款工具","insight":"AI 研究工具已经不是单点突破，而是全链路覆盖。值得关注的是工具之间的「数据互通」——如果访谈 AI 的洞察能自动流入可用性测试工具的假设库，研究效率会再上一个台阶。","action":"梳理团队当前的研究工具链，找到「数据断裂点」（比如访谈笔记在 Notion、测试数据在 Maze、问卷在飞书多维表格），评估引入 AI 研究中台的可行性。","tags":["AI研究工具","全链路","工具选型","数据互通"],"sourceUrls":[{"name":"18 款 AI UX 研究工具对比","url":"https://blog.buildbetter.ai/best-ai-tools-ux-research-2026/"},{"name":"AI UX 研究方法","url":"https://www.webmoghuls.com/ai-ux-research-methods-2026/"}]},{"title":"AI 生成代码 45% 含安全漏洞——用户对 AI 输出的信任问题正在从内容蔓延到代码和决策","source":"2026-04-07 / Veracode + NYT + CSA","sourceDetail":"Veracode 测试 100+ LLM，45% 的生成代码含 OWASP Top 10 漏洞；60% 联邦法官用 AI 起草裁决但错误率 17-33%；74% 研究者认为 AI 分析需人工审查","insight":"用户对 AI 的信任度正在经历「去魅」阶段。无论是代码、法律文书还是设计研究，74% 的人仍要求人工审查。这不是坏事——产品设计应该拥抱这种审慎，把「人工审查」设计成流程的一部分而非可选项。","action":"在帮写和 AI 研究工具的设计中，默认加入「AI 标注 + 人工确认」的双层机制，比如在 AI 总结的访谈洞察旁标注「来源片段」方便快速核实。","tags":["AI信任","安全漏洞","人工审查","去魅"],"sourceUrls":[{"name":"CSA Vibe Coding 安全债务报告","url":"https://cloudsecurityalliance.org/blog/2026/04/07/vibe-codings-security-debt"},{"name":"Veracode 测试报告","url":"https://www.veracode.com/resources/state-of-software-security"}]}]},"design_output":{"label":"设计稿输出","summary":"出稿方式正在被 AI 从两端夹击：上游，PRD 可以直接生成多页面原型和可运行代码；下游，AI Agent 可以 24 小时不停地把设计稿变成产品功能。设计师的价值越来越集中在「判断和取舍」上。","items":[{"title":"从文本到可编辑 UI 的秒级转换：Flowstep 让设计稿输出从「画」变成「说」","source":"2026-04-03 / Webdesign-Inspiration","sourceDetail":"Flowstep 支持导入 PRD/参考图/URL，一次性生成完整多页面体验（含导航逻辑），支持 Figma 导出和 React/TypeScript/Tailwind CSS 生产级代码","insight":"出稿的起点变了——不是从空白画布开始画，而是从「描述你要什么」开始。这对设计师的技能要求转移了：写好 PRD 和设计约束的能力，比 Figma 操作熟练度更重要。","action":"在下次需求评审后，用 Flowstep 导入 PRD 快速出 2-3 个方向的多页面原型，替代传统的线框图环节，看能省多少时间。","tags":["Flowstep","文本到UI","PRD驱动","代码导出"],"sourceUrls":[{"name":"7 AI Tools 文章","url":"https://www.webdesign-inspiration.com/article/7-ai-tools-that-are-actually-changing-ui-ux-design-in-2026/"},{"name":"Flowstep","url":"https://www.flowstep.ai/"}]},{"title":"Figma Make 设计系统感知：AI 出稿终于能正确调用组件库了","source":"2026-04-02 ~ 2026-04-04 / SegmentFault + Figma 官方","sourceDetail":"Figma Make 原生 AI 功能：自动调用现有组件库和变量、批量重命名图层、交互原型直出、零上下文切换","insight":"AI 出稿最大的痛点不是「生成不了」而是「生成的不一致」——字号、颜色、间距全跟设计系统对不上。Figma Make 的设计系统感知能力是目前最接近解决这个问题的方案。设计组件库的规范性变得比以前更重要：AI 读得懂的命名规则 = 更好的 AI 出稿质量。","action":"① 审查现有 Figma 组件库的命名规范，确保 AI 可读性（用英文 + 语义化命名）；② 让团队试用 Figma Make 生成一个中等复杂度页面，评估组件库调用准确率。","tags":["Figma Make","设计系统","组件库","一致性"],"sourceUrls":[{"name":"Figma AI 深度评测","url":"https://similarlabs.com/zh/blog/figma-ai-review"},{"name":"SegmentFault 测评","url":"https://segmentfault.com/a/1190000047690857"}]},{"title":"9 人团队 7 个 AI Agent 一月交付 10 功能：设计→开发的链路被 Agent 压缩到极致","source":"2026-04-07 / WSJ + ReadAboutAI","sourceDetail":"JustPaid 使用 OpenClaw + Claude Code 组建 7 个 AI Agent 虚拟工程团队，24 小时运行，初始成本 ~$4000/周，交付效率远超传统开发团队","insight":"当下游开发可以被 AI Agent 24 小时执行时，设计稿输出的瓶颈反而变成了上游的决策速度。设计师出稿慢不再只影响设计环节，而是成为整个 Agent 工程链条的瓶颈。这倒逼设计师要么用 AI 加速出稿，要么被整个流程绕过。","action":"关注 AI Agent 对「设计→开发」交付流程的影响，评估在什么场景下 Agent 可以跳过 Figma 直接从设计规范生成代码，以及设计师应该在哪个环节介入做质量把关。","tags":["AI Agent","开发效率","设计瓶颈","交付加速"],"sourceUrls":[{"name":"WSJ 报道","url":"https://www.msn.com/en-us/money/other/meet-the-startup-that-used-ai-and-openclaw-to-automate-its-own-developers/ar-AA1ZOArN"},{"name":"ReadAboutAI 周报","url":"https://www.readaboutai.com/april-7-2026/"}]}]},"validation":{"label":"设计方案验证","summary":"设计验证的「模块化工具组合」成型：Maze 做 AI 自动可用性测试，Khroma 做配色验证，Jasper 做文案验证。验证不再是上线前的最后一步，而是设计过程中的持续反馈环。","items":[{"title":"Maze AI 自动可用性测试：从「录完 10 个人逐个看回放」到「5 分钟出热力图 + 洞察摘要」","source":"2026-04-03 / Webdesign-Inspiration","sourceDetail":"Maze 支持无主持用户测试，AI 自动生成热力图和点击流报告、标记摩擦点、总结发现，直接连接 Figma 原型","insight":"设计验证的效率瓶颈从来不是「找不到用户」，而是「分析太慢」。看 10 个人的测试录像要一天，但 Maze AI 几分钟就能出结构化报告。这让「每次迭代都做一轮快速测试」变成现实，而不是只在大版本上线前做一次。","action":"在下次设计迭代中，用 Maze 对 Figma 原型做一轮快速无主持测试（5-8 人），重点验证帮写功能的触发方式是否符合用户心智模型。","tags":["Maze","可用性测试","AI分析","热力图"],"sourceUrls":[{"name":"7 AI Tools 文章","url":"https://www.webdesign-inspiration.com/article/7-ai-tools-that-are-actually-changing-ui-ux-design-in-2026/"},{"name":"Maze 官网","url":"https://maze.co/"}]},{"title":"Perspective AI 让设计验证从「假设驱动」变成「用户驱动」：AI 自动做深度访谈","source":"2026-04 / Perspective AI","sourceDetail":"AI 自动与真实用户进行深度访谈，覆盖用户体验验证场景，产出结构化洞察，支持规模化运行","insight":"传统设计验证的问题是样本太小——通常只测 5-8 个人就得出结论。AI 访谈可以把样本量拉到几十甚至上百，同时保持深度对话的质量（而非问卷的浅层回答）。这对「AI 帮写是否被信任」这类需要大量定性反馈的验证问题特别有价值。","action":"评估 Perspective AI 在「帮写信任度验证」场景的适用性，设计一个 50 人规模的 AI 访谈验证方案，看能否替代传统的 5 人可用性测试。","tags":["AI访谈","规模化验证","Perspective AI","定性研究"],"sourceUrls":[{"name":"Perspective AI 指南","url":"https://getperspective.ai/docs/use-cases/ux-research-validation-guide"},{"name":"Quallee AI 研究方法","url":"https://quallee.ai/en/insights/7-reasons-ai-ux-research-2026"}]},{"title":"设计验证工具链成型：Khroma 验配色 + Jasper 验文案 + Maze 验交互，模块化组合替代全能工具","source":"2026-04-03 / Webdesign-Inspiration 综合","sourceDetail":"Khroma：神经网络学习用户审美偏好生成配色（只需选 50 个喜欢的颜色），附带字体搭配建议；Jasper：批量生成按钮标签/错误信息/引导文案，语调可调；两者与 Maze 构成完整验证链","insight":"设计验证不应该是一个「大而全」的环节，而是分散在设计过程中的持续反馈。配色用 Khroma 秒级验证、文案用 Jasper 批量生成 A/B 版本、交互用 Maze 快速测试——每个模块 5-10 分钟，总耗时远少于传统的「做完再一次性验证」。","action":"推动团队在设计流程中引入「持续验证」机制：① 每次出新配色方案时用 Khroma 做一轮审美匹配度检查；② 用 Jasper 为关键交互文案生成 3 个版本做团队投票。","tags":["工具组合","Khroma","Jasper","持续验证"],"sourceUrls":[{"name":"工具组合建议","url":"https://www.webdesign-inspiration.com/article/7-ai-tools-that-are-actually-changing-ui-ux-design-in-2026/"},{"name":"Khroma AI 配色","url":"https://www.khroma.co/"}]}]}}};

  mode: 'custom',
  customEndpoint: 'http://127.0.0.1:8124/tts',
  voiceId: '',
  headers: {}
};

// ========== 预生成音频支持 ==========
// manifest 缓存: { '2026-04-08': { segments: [...], ... } | null }
const audioManifestCache = {};

async function loadAudioManifest(dateStr) {
  if (dateStr in audioManifestCache) return audioManifestCache[dateStr];
  try {
    const resp = await fetch('audio/' + dateStr + '/manifest.json', { cache: 'default' });
    if (resp.ok) {
      const manifest = await resp.json();
      audioManifestCache[dateStr] = manifest;
      console.log('[Podcast] 预生成音频可用:', dateStr, manifest.total_segments + '段');
      return manifest;
    }
  } catch(e) { /* no pre-generated audio */ }
  audioManifestCache[dateStr] = null;
  return null;
}

function getPregenAudioUrl(dateStr, segIdx) {
  const manifest = audioManifestCache[dateStr];
  if (!manifest || !manifest.segments) return null;
  const seg = manifest.segments.find(s => s.index === segIdx);
  if (!seg) return null;
  return 'audio/' + dateStr + '/' + seg.file;
}
// ========== 预生成音频支持 END ==========

function setVoiceButtonState(mode, label) {
  const button = document.getElementById('voicePlayButton');
  if (!button) return;
  const icon = button.querySelector('.voice-btn-icon');
  const labelNode = button.querySelector('.voice-btn-label');
  button.classList.toggle('is-playing', mode === 'playing');
  button.setAttribute('aria-label', label);
  button.setAttribute('title', label);
  if (icon) {
    icon.textContent = mode === 'playing' ? '■' : '▶';
  }
  if (labelNode) {
    labelNode.textContent = label;
  }
}

function clearActiveAudioObjectUrl() {
  if (activeAudioObjectUrl) {
    URL.revokeObjectURL(activeAudioObjectUrl);
    activeAudioObjectUrl = null;
  }
}

function stopVoicePlayback(shouldResetLabel) {
  if (window.speechSynthesis) {
    window.speechSynthesis.cancel();
  }
  activeSpeechUtterance = null;

  if (activeAudioElement) {
    activeAudioElement.pause();
    activeAudioElement.currentTime = 0;
    activeAudioElement = null;
  }
  clearActiveAudioObjectUrl();

  if (shouldResetLabel) {
    updateVoiceButtonAvailability();
  }
}

function updateVoiceButtonAvailability() {
  const button = document.getElementById('voicePlayButton');
  if (!button) return;

  if (currentMainPage !== 'insight') {
    button.disabled = true;
    setVoiceButtonState('idle', '仅 Insight');
    return;
  }

  if (!latestInsightData) {
    button.disabled = true;
    setVoiceButtonState('idle', '暂无可播');
    return;
  }

  button.disabled = false;
  if (!button.classList.contains('is-playing')) {
    setVoiceButtonState('idle', '播放资讯');
  }
}

function shortenForVoice(text, maxLength) {
  if (!text) return '';
  const normalized = String(text).replace(/\s+/g, ' ').trim();
  if (normalized.length <= maxLength) return normalized;
  return normalized.slice(0, maxLength) + '…';
}

function buildVoiceBriefing(data) {
  if (!data) return '';

  const parts = [];
  parts.push(`以下是 ${data.date} 的 AI Insights 语音播报。`);

  if (data.daily_summary) {
    parts.push(`今日摘要：${shortenForVoice(data.daily_summary, 140)}`);
  }

  if (Array.isArray(data.design_insights) && data.design_insights.length) {
    const insightText = data.design_insights.slice(0, 3).map(function(item, index) {
      return `第 ${index + 1} 条，${item.title}。`;
    }).join(' ');
    parts.push(`重点设计洞察有三条。${insightText}`);
  }

  if (Array.isArray(data.demand_mining) && data.demand_mining.length) {
    const demandText = data.demand_mining.slice(0, 2).map(function(item, index) {
      return `机会 ${index + 1}，${item.title}。`;
    }).join(' ');
    parts.push(`值得跟进的需求机会有两条。${demandText}`);
  }

  if (Array.isArray(data.hot_news) && data.hot_news.length) {
    const newsText = data.hot_news.slice(0, 3).map(function(item, index) {
      return `资讯 ${index + 1}，${item.title}。`;
    }).join(' ');
    parts.push(`热点资讯里，优先可以关注这三条。${newsText}`);
  }

  parts.push('想看完整内容，可以继续浏览当前页面。');
  return parts.join(' ');
}

function pickBrowserVoice() {
  if (!window.speechSynthesis) return null;
  const voices = window.speechSynthesis.getVoices() || [];
  for (let i = 0; i < voices.length; i++) {
    const voice = voices[i];
    const lang = (voice.lang || '').toLowerCase();
    const name = (voice.name || '').toLowerCase();
    if (lang.indexOf('zh') === 0 || name.indexOf('chinese') !== -1 || name.indexOf('中文') !== -1) {
      return voice;
    }
  }
  return voices[0] || null;
}

function playWithBrowserVoice(data) {
  if (!window.speechSynthesis || typeof SpeechSynthesisUtterance === 'undefined') {
    throw new Error('当前浏览器不支持内置语音播报。');
  }

  const text = buildVoiceBriefing(data);
  if (!text) {
    throw new Error('当前没有可播报的资讯内容。');
  }

  stopVoicePlayback(false);

  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = 'zh-CN';
  utterance.rate = 1.02;
  utterance.pitch = 1;
  utterance.volume = 1;

  const voice = pickBrowserVoice();
  if (voice) {
    utterance.voice = voice;
  }

  utterance.onend = function() {
    activeSpeechUtterance = null;
    updateVoiceButtonAvailability();
  };
  utterance.onerror = function() {
    activeSpeechUtterance = null;
    updateVoiceButtonAvailability();
    alert('语音播报中断了，可以再点一次试试。');
  };

  activeSpeechUtterance = utterance;
  setVoiceButtonState('playing', '停止播报');
  window.speechSynthesis.speak(utterance);
}

async function requestCustomVoiceAudio(text, data, voice='alex') {
  if (!VOICE_PLAYBACK_CONFIG.customEndpoint) {
    throw new Error('还没配置你的声音接口。把 VOICE_PLAYBACK_CONFIG.customEndpoint 填上就能切过去。');
  }

  const headers = Object.assign({ 'Content-Type': 'application/json' }, VOICE_PLAYBACK_CONFIG.headers || {});
  const controller = new AbortController();
  const timeoutId = setTimeout(function() { controller.abort(); }, 120000);
  const response = await fetch(VOICE_PLAYBACK_CONFIG.customEndpoint, {
    method: 'POST',
    headers: headers,
    signal: controller.signal,
    body: JSON.stringify({
      text: text,
      voiceId: VOICE_PLAYBACK_CONFIG.voiceId,
      voice: voice,  // 'alex' 或 'mia'
      date: data.date,
      source: 'ai-insights-hub'
    })
  });
  clearTimeout(timeoutId);

  if (!response.ok) {
    throw new Error('自定义语音接口调用失败：' + response.status);
  }

  const contentType = response.headers.get('content-type') || '';
  if (contentType.indexOf('application/json') !== -1) {
    const result = await response.json();
    if (!result.audioUrl) {
      throw new Error('自定义语音接口没有返回 audioUrl。');
    }
    return { url: result.audioUrl, revokeAfterPlay: false };
  }

  const blob = await response.blob();
  return { url: URL.createObjectURL(blob), revokeAfterPlay: true };
}

async function playWithCustomVoice(data) {
  const text = buildVoiceBriefing(data);
  if (!text) {
    throw new Error('当前没有可播报的资讯内容。');
  }

  stopVoicePlayback(false);

  const audioPayload = await requestCustomVoiceAudio(text, data);
  activeAudioElement = new Audio(audioPayload.url);
  activeAudioObjectUrl = audioPayload.revokeAfterPlay ? audioPayload.url : null;

  activeAudioElement.onended = function() {
    activeAudioElement = null;
    clearActiveAudioObjectUrl();
    updateVoiceButtonAvailability();
  };
  activeAudioElement.onerror = function() {
    activeAudioElement = null;
    clearActiveAudioObjectUrl();
    updateVoiceButtonAvailability();
    alert('你的声音音频加载失败了，请检查 TTS 接口返回。');
  };

  setVoiceButtonState('playing', '停止播报');
  await activeAudioElement.play();
}

async function handleVoicePlayback() {
  const button = document.getElementById('voicePlayButton');
  if (!button || button.disabled) return;

  if (button.classList.contains('is-playing')) {
    stopVoicePlayback(true);
    return;
  }

  if (!latestInsightData) {
    alert('当前没有可播报的数据。');
    return;
  }

  try {
    if (VOICE_PLAYBACK_CONFIG.mode === 'custom') {
      // 先检查 TTS 代理是否可用，不可用则回退
      let proxyOk = false;
      try {
        const healthUrl = VOICE_PLAYBACK_CONFIG.customEndpoint.replace(/\/tts$/, '/health');
        const controller = new AbortController();
        const tid = setTimeout(function() { controller.abort(); }, 5000);
        const hc = await fetch(healthUrl, { method: 'GET', signal: controller.signal });
        clearTimeout(tid);
        proxyOk = hc.ok;
      } catch(e) {
        console.warn('[Voice] 健康检查失败:', e.message || e);
        proxyOk = false;
      }

      if (proxyOk) {
        await playWithCustomVoice(latestInsightData);
      } else {
        console.warn('[Voice] TTS 代理未启动，回退到浏览器语音');
        playWithBrowserVoice(latestInsightData);
      }
    } else {
      playWithBrowserVoice(latestInsightData);
    }
  } catch (error) {
    stopVoicePlayback(true);
    alert(error && error.message ? error.message : '播报启动失败。');
  }
}

// fetch 加超时封装
async function fetchWithTimeout(url, ms = 8000) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), ms);
  try {
    const r = await fetch(url, { signal: controller.signal });
    clearTimeout(timer);
    return r;
  } catch (e) {
    clearTimeout(timer);
    throw e;
  }
}

function formatDate(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function formatDisplayDate(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  const weekdays = ['周日','周一','周二','周三','周四','周五','周六'];
  return `${d.getMonth()+1}月${d.getDate()}日 ${weekdays[d.getDay()]}`;
}

async function loadData(dateStr) {
  try {
    const resp = await fetchWithTimeout(`${DATA_DIR}${dateStr}.json`);
    if (!resp.ok) return null;
    return await resp.json();
  } catch(e) { return null; }
}

function splitStructuredText(text, maxItems) {
  if (!text) return [];
  const normalized = String(text)
    .replace(/\s+/g, ' ')
    .replace(/[；;]/g, '。')
    .trim();

  const items = normalized
    .split(/[。！？]/)
    .map(item => item.trim())
    .filter(Boolean)
    .map(item => /[。！？]$/.test(item) ? item : `${item}。`);

  if (typeof maxItems === 'number') {
    return items.slice(0, maxItems);
  }
  return items;
}

/**
 * 头图统计数字与实际列表条数保持一致，避免用户看到的概览和下方内容对不上。
 */
function computeHeroDisplayStats(data) {
  if (!data) return { design_insights: 0, demand_mining: 0, hot_news: 0 };

  return {
    design_insights: (data.design_insights || []).length,
    demand_mining: (data.demand_mining || []).length,
    hot_news: (data.hot_news || []).length
  };
}

function buildInsightList(items) {
  if (!items || !items.length) return '';
  return `<ul class="insight-points">${items.map(item => `<li>${item}</li>`).join('')}</ul>`;
}

function pickInsightQuickTake(summaryPoints, implicationPoints, fallbackTitle) {
  const candidates = [...(implicationPoints || []), ...(summaryPoints || []), fallbackTitle || ''];
  for (const text of candidates) {
    if (!text) continue;
    if (/^(两个维度|一是|二是|三是|建议|这是|同时|另外)/.test(text)) continue;
    return text;
  }
  return candidates.find(Boolean) || '';
}

function preloadBlogSegments(data) {
  try {
    const dialogue = generateDialogue(data);
    if (!dialogue || !dialogue.length) return;
    const dateStr = formatDate(currentDate);
    blogDataCache[dateStr] = data;
    window._preloadedDialogue = dialogue;
    window._preloadTotal = dialogue.length;
    window._preloadDone = 0;
    window._preloadReady = false;

    // 尝试加载预生成音频 manifest
    loadAudioManifest(dateStr).then(manifest => {
      if (manifest && manifest.segments && manifest.segments.length > 0) {
        // 有预生成音频 → 直接用静态 URL 填充缓存
        for (let i = 0; i < dialogue.length; i++) {
          const url = getPregenAudioUrl(dateStr, i);
          if (url) {
            blogPreloadCache[i] = { url: url, revoke: false };
          }
          window._preloadDone++;
        }
        window._preloadReady = true;
        console.log('[Podcast] 全部使用预生成音频，共', dialogue.length, '段');
      } else {
        // 无预生成音频 → 走 TTS 实时生成
        const blobData = { data: data, date: data.date };
        const text0 = blogStripHtml(dialogue[0].text);
        if (text0 && !blogPreloadCache[0]) {
          requestCustomVoiceAudio(text0, blobData, 'alex').then(result => {
            blogPreloadCache[0] = { url: result.url, revoke: result.revokeAfterPlay };
            window._preloadDone++;
            window._preloadReady = true;
            preloadRemaining(dialogue, blobData, 1);
          }).catch(() => {
            window._preloadDone++;
            window._preloadReady = true;
            preloadRemaining(dialogue, blobData, 1);
          });
        } else {
          window._preloadDone++;
          window._preloadReady = true;
          preloadRemaining(dialogue, blobData, 1);
        }
      }
    });
  } catch(e) {
    console.warn('Blog preload skipped:', e);
  }
}

function preloadRemaining(dialogue, blobData, startIdx) {
  const queue = [];
  for (let i = startIdx; i < dialogue.length; i++) queue.push(i);
  let active = 0;
  const MAX_CONCURRENT = 2;

  function processNext() {
    while (active < MAX_CONCURRENT && queue.length > 0) {
      const idx = queue.shift();
      const text = blogStripHtml(dialogue[idx].text);
      if (!text || blogPreloadCache[idx]) {
        window._preloadDone++;
        continue;
      }
      active++;
      requestCustomVoiceAudio(text, blobData, 'alex').then(result => {
        blogPreloadCache[idx] = { url: result.url, revoke: result.revokeAfterPlay };
        window._preloadDone++;
      }).catch(() => {

        active--;
        processNext();
      });
    }
  }
  processNext();
}

// ===== 周维度工具函数 =====
// 获取某日期所在周的周一（ISO：周一为第一天）
function getWeekMonday(date) {
  const d = new Date(date);
  const day = d.getDay(); // 0=Sun, 1=Mon...
  const diff = day === 0 ? -6 : 1 - day; // 周日往前推6天，其他往前推到周一
  d.setDate(d.getDate() + diff);
  d.setHours(0,0,0,0);
  return d;
}

// 格式化周范围显示：如 "3月17日 - 3月23日"
function formatWeekRange(monday) {
  const sunday = new Date(monday);
  sunday.setDate(monday.getDate() + 6);
  const fmt = (d) => `${d.getMonth()+1}月${d.getDate()}日`;
  return `${fmt(monday)} - ${fmt(sunday)}`;
}

// 加载并聚合一周数据（并发 fetch 7 天）
async function loadWeekData(monday) {
  const dates = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    dates.push(formatDate(d));
  }

  const results = await Promise.all(dates.map(ds =>
    fetchWithTimeout(DATA_DIR + ds + '.json', 8000)
      .then(r => r.ok ? r.json().then(j => ({ date: ds, data: j })) : null)
      .catch(() => null)
  ));

  // 合并各天数据
  const merged = {
    week_start: formatDate(monday),
    week_range: formatWeekRange(monday),
    daily_summary: '',
    design_insights: [],
    demand_mining: [],
    hot_news: [],
    _days_loaded: 0
  };

  const summaries = [];
  results.forEach(r => {
    if (!r || !r.data) return;
    merged._days_loaded++;
    const ds = r.date.slice(5); // MM-DD

    if (r.data.daily_summary) summaries.push(`[${ds}] ${r.data.daily_summary}`);

    (r.data.design_insights || []).forEach(item => {
      merged.design_insights.push({ ...item, _date: ds });
    });
    (r.data.demand_mining || []).forEach(item => {
      merged.demand_mining.push({ ...item, _date: ds });
    });
    (r.data.hot_news || []).forEach(item => {
      merged.hot_news.push({ ...item, _date: ds });
    });
  });

  // 生成周总结：从洞察 implication 中提取对输入法产品的关键行动建议
  if (merged.design_insights.length) {
    const conclusions = [];
    merged.design_insights.forEach(ins => {
      const imp = ins.implication || '';
      // 按分号拆句
      imp.split(/[；;]/).forEach(s => {
        s = s.trim().replace(/^\(\d+\)\s*/, ''); // 去编号前缀
        // 找含"输入法"且有行动建议的句子
        if (/输入法/.test(s) && /应|可以|必须|建议|需要|可借鉴|加速|规划/.test(s)) {
          // 取——后面的结论部分
          if (s.indexOf('——') > -1) s = s.split('——').pop();
          s = s.trim().replace(/[，,]$/, '');
          if (s.length >= 15 && s.length <= 50) conclusions.push(s);
        }
      });
    });

    // 去重（前8字相同视为重复）
    const unique = [];
    const seen = {};
    conclusions.forEach(c => {
      const key = c.slice(0, 8);
      if (!seen[key]) { seen[key] = true; unique.push(c); }
    });

    merged.daily_summary = unique.length
      ? unique.slice(0, 4).join('；') + '。'
      : '';
  } else {
    merged.daily_summary = '';
  }

  return merged._days_loaded > 0 ? merged : null;
}

// 判断当前是否在本周
function isCurrentWeek(date) {
  const now = new Date();
  const thisMonday = getWeekMonday(new Date(now.getFullYear(), now.getMonth(), now.getDate()));
  const viewMonday = getWeekMonday(date);
  return formatDate(thisMonday) === formatDate(viewMonday);
}

function classifyDemand(item) {
  var title = item.title || '';
  if (/安全|信任|可信度|置信度|隐私|透明|合规|防伪|幻觉|回滚|过滤|审核|水印|来源标注|坦诚|事实核查|权限|自治/.test(title))
    return '安全信任类';
  if (/模型路由|端云|端侧|离线|成本|降级|冗余|自研|部署|供应商/.test(title))
    return '基础设施类';
  if (/个性化|知识库|素材库|人设|风格|语气|历史文案|屏幕上下文/.test(title))
    return '个性化类';
  if (/Agent|入口|平台|超级入口|智能体|任务|服务跳转|通知预回复/.test(title))

  return '帮写场景类';

function renderDemandMapClusters(clusters) {
  var chips = [
    { name: '帮写场景类', icon: '✏️' },
    { name: '安全信任类', icon: '🔒' },
    { name: '基础设施类', icon: '⚙️' },
    { name: '个性化类', icon: '🎨' },
    { name: '平台入口类', icon: '🚀' }
  ];
  var chipsEl = document.getElementById('map-clusters-chips');
  var bodyEl = document.getElementById('map-clusters-body');
  if (!chipsEl || !bodyEl) return;

  var firstActive = clusters && clusters.length ? clusters[0].name : '帮写场景类';

  // Compute trend: count items added in last 14 days vs prior 14 days
  var now = new Date();
  function trendForCluster(items) {
    var recent = 0, older = 0;
    items.forEach(function(item) {
      var ds = item.date || item.source_date || '';
      if (!ds) return;
      // ds is "MM-DD" or "YYYY-MM-DD"
      var d;
      if (/^\d{4}-\d{2}-\d{2}$/.test(ds)) {
        d = new Date(ds + 'T00:00:00');
      } else if (/^\d{2}-\d{2}$/.test(ds)) {
        d = new Date(now.getFullYear() + '-' + ds + 'T00:00:00');
      } else return;
      var ageDays = (now - d) / 86400000;
      if (ageDays <= 14) recent++;
      else if (ageDays <= 28) older++;
    });
    return { recent: recent, older: older };
  }

  // Render chips
  var chipsHtml = '';
  chips.forEach(function(c) {
    var count = 0;
    var trendHtml = '';
    if (clusters) {
      var cdata = clusters.find(function(x) { return x.name === c.name; });
      if (cdata) {
        count = cdata.count || cdata.items.length;
        var trend = trendForCluster(cdata.items);
        if (trend.recent > trend.older + 1) {
          trendHtml = ' <span class="trend-up">↑' + trend.recent + '</span>';
        } else if (trend.older > trend.recent + 1) {
          trendHtml = ' <span class="trend-down">↓</span>';
        } else if (trend.recent > 0) {
          trendHtml = ' <span class="trend-flat">→' + trend.recent + '</span>';
        }
      }
    }
    var isActive = c.name === firstActive;
    chipsHtml += '<button class="cluster-chip" data-cluster="' + c.name + '" onclick="switchCluster(\'' + c.name + '\')" style="padding:8px 14px;border-radius:999px;font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:all 0.2s;background:' + (isActive ? '#111' : 'rgba(0,0,0,0.05)') + ';color:' + (isActive ? '#fff' : '#555') + ';">' + c.icon + ' ' + c.name + ' · ' + count + trendHtml + '</button>';
  });
  chipsEl.innerHTML = chipsHtml;

  // Render cluster blocks
  var bodyHtml = '';
  var clusterDescs = {
    '帮写场景类': '聚焦帮写生成、风格控制、素材调用和写作协同。',
    '安全信任类': '聚焦隐私保护、可信度标注、内容合规审核与安全过滤。',
    '基础设施类': '聚焦端云协同、模型路由、成本优化与部署架构。',
    '个性化类': '聚焦用户画像、知识库、风格自适应与人设规则。',
    '平台入口类': '聚焦 Agent 化、超级入口、跨平台服务跳转。'
  };
  chips.forEach(function(c) {
    var cdata = clusters ? clusters.find(function(x) { return x.name === c.name; }) : null;
    var items = cdata ? cdata.items : [];
    var highPri = items.filter(function(x) { return x.priority === '高'; }).length;
    var isActive = c.name === firstActive;
    bodyHtml += '<div class="cluster-block" data-cluster="' + c.name + '" style="display:' + (isActive ? 'block' : 'none') + ';background:rgba(255,255,255,0.88);border-radius:24px;border:1px solid rgba(0,0,0,0.06);padding:28px;margin-bottom:18px;">' +
      '<div style="display:flex;justify-content:space-between;gap:18px;align-items:start;margin-bottom:20px;flex-wrap:wrap;">' +
        '<div>' +
          '<div style="font-size:11px;font-weight:700;letter-spacing:1.6px;text-transform:uppercase;color:#888;margin-bottom:10px;">Function cluster</div>' +
          '<h3 style="font-size:28px;font-weight:900;letter-spacing:-1px;margin-bottom:8px;">' + c.icon + ' ' + c.name + '</h3>' +
          '<p style="font-size:14px;color:#555;line-height:1.8;">' + (clusterDescs[c.name] || '') + '</p>' +
        '</div>' +
        '<div style="display:flex;gap:10px;flex-wrap:wrap;">' +

async function loadAndRenderMapClusters() {
  if (demandClusterCache) {
    renderDemandMapClusters(demandClusterCache);
    return;
  }
  // Build date list from 03-17 (first data) to today
  var dateStrs = [];
  var now = new Date();
  for (var d = new Date('2026-03-17'); d <= now; d.setDate(d.getDate() + 1)) {
    dateStrs.push(d.toISOString().split('T')[0]);
  }

  // Parallel fetch all date files
  var results = await Promise.all(dateStrs.map(function(ds) {
    return fetch(DATA_DIR + ds + '.json')
      .then(function(r) { return r.ok ? r.json().then(function(j) { return { date: ds, data: j }; }) : null; })
      .catch(function() { return null; });
  }));

  // Collect all demand_mining items
  var allDemand = [];
  results.forEach(function(r) {
    if (!r || !r.data || !Array.isArray(r.data.demand_mining)) return;
    r.data.demand_mining.forEach(function(item) {
      item.date = item.date || r.date.slice(5);
      allDemand.push(item);
    });
  });

  // Classify into clusters
  var clusters = {};
  var clusterNames = ['帮写场景类', '安全信任类', '基础设施类', '个性化类', '平台入口类'];
  clusterNames.forEach(function(n) { clusters[n] = []; });
  allDemand.forEach(function(item) {
    var cat = classifyDemand(item);
    if (!clusters[cat]) clusters[cat] = [];
    clusters[cat].push(item);
  });

  var clusterData = clusterNames.map(function(name) {
    return { name: name, count: clusters[name].length, items: clusters[name] };
  });

  demandClusterCache = clusterData;
  renderDemandMapClusters(clusterData);
}

const DESIGN_STAGE_ICONS = {research:'🔍',competitive:'📊',user_research:'🧑‍🤝‍🧑',design_output:'🎨',validation:'✅'};
const DESIGN_STAGE_NUMS = {research:'01',competitive:'02',user_research:'03',design_output:'04',validation:'05'};
const DESIGN_STAGE_KEYS = ['research','competitive','user_research','design_output','validation'];
var designWeeklyState = {
  mergedData: null,
  bootstrapPromise: null
};

function buildDesignWeeklyCandidateFiles(daysBack) {
  var files = [];
  for (var d = 0; d <= daysBack; d++) {
    var dt = new Date();
    dt.setDate(dt.getDate() - d);
    files.push('design-weekly-' + formatDate(dt) + '.json');
  }
  return files;
}

function getDesignWeeklyReportKey(report, fallbackKey) {
  return [report.weekOf || '', report.generatedAt || '', fallbackKey || ''].join('|');
}

function getDesignWeeklySortValue(report, fallbackKey) {
  var raw = report.generatedAt || report.weekOf || fallbackKey || '';
  return String(raw).replace(/[^0-9]/g, '') || '0';
}

function mergeDesignWeeklyReports(reports) {
  if (!reports || !reports.length) return null;

  var sorted = reports.slice().sort(function(a, b) {
    var aKey = getDesignWeeklySortValue(a, a.__fileKey);
    var bKey = getDesignWeeklySortValue(b, b.__fileKey);
    if (aKey === bKey) return 0;
    return aKey > bKey ? -1 : 1;
  });

  var merged = {
    weekOf: sorted[0].weekOf || '',
    generatedAt: sorted[0].generatedAt || '',
    dataSources: [],
    stages: {},
    reportCount: sorted.length,
    weekLabels: []
  };
  var sourceSeen = {};
  var weekSeen = {};

  for (var i = 0; i < sorted.length; i++) {
    var report = sorted[i];
    if (Array.isArray(report.dataSources)) {
      for (var j = 0; j < report.dataSources.length; j++) {
        var ds = report.dataSources[j];
        if (!sourceSeen[ds]) {
          sourceSeen[ds] = true;
          merged.dataSources.push(ds);
        }
      }
    }
    if (report.weekOf && !weekSeen[report.weekOf]) {
      weekSeen[report.weekOf] = true;
      merged.weekLabels.push(report.weekOf);
    }
  }

  for (var s = 0; s < DESIGN_STAGE_KEYS.length; s++) {
    var stageKey = DESIGN_STAGE_KEYS[s];
    var stageInfo = null;
    var itemSeen = {};
    var mergedItems = [];

    for (var r = 0; r < sorted.length; r++) {
      var stage = sorted[r].stages && sorted[r].stages[stageKey];
      if (!stage) continue;

      if (!stageInfo) {
        stageInfo = {
          label: stage.label || '',
          summary: stage.summary || '',
          items: []
        };
      } else {
        if (!stageInfo.label && stage.label) stageInfo.label = stage.label;
        if (!stageInfo.summary && stage.summary) stageInfo.summary = stage.summary;
      }

      var items = Array.isArray(stage.items) ? stage.items : [];
      for (var k = 0; k < items.length; k++) {
        var item = items[k];
        var itemKey = [item.title || '', item.source || '', item.insight || ''].join('|');
        if (itemSeen[itemKey]) continue;
        itemSeen[itemKey] = true;
        mergedItems.push(item);
      }
    }

    if (stageInfo) {
      stageInfo.items = mergedItems;
      merged.stages[stageKey] = stageInfo;
    }
  }

  return merged;
}

async function fetchDesignWeeklyReports() {
  var reports = [];
  var seen = {};

  function pushReport(report, fallbackKey) {
    if (!report) return;
    var key = getDesignWeeklyReportKey(report, fallbackKey);
    if (seen[key]) return;
    seen[key] = true;
    if (fallbackKey) report.__fileKey = fallbackKey;
    reports.push(report);
  }

  if (typeof DESIGN_WEEKLY_INLINE !== 'undefined' && DESIGN_WEEKLY_INLINE) {
    pushReport(DESIGN_WEEKLY_INLINE, 'inline');
  }

  var files = buildDesignWeeklyCandidateFiles(30);
  var fetched = await Promise.all(files.map(async function(file) {
    try {
      var resp = await fetch(DATA_DIR + file, { cache: 'no-cache' });
      if (!resp.ok) return null;
      var data = await resp.json();
      data.__fileKey = file;
      return data;
    } catch (e) {
      return null;
    }
  }));

  for (var i = 0; i < fetched.length; i++) {
    if (fetched[i]) pushReport(fetched[i], fetched[i].__fileKey);
  }

  return reports;
}

async function initDesignWeekly() {
  var page = document.getElementById('design-page');
  if (!page) return null;

  if (designWeeklyState.bootstrapPromise) {
    return designWeeklyState.bootstrapPromise;
  }

  designWeeklyState.bootstrapPromise = (async function() {
    if (typeof DESIGN_WEEKLY_INLINE !== 'undefined' && DESIGN_WEEKLY_INLINE) {
      designWeeklyState.mergedData = mergeDesignWeeklyReports([DESIGN_WEEKLY_INLINE]);
      if (designWeeklyState.mergedData) {
        renderDesignWeekly(designWeeklyState.mergedData, page);
      }
    }

    try {
      var reports = await fetchDesignWeeklyReports();
      var merged = mergeDesignWeeklyReports(reports);
      if (merged) {
        designWeeklyState.mergedData = merged;
        renderDesignWeekly(merged, page);
        return merged;
      }
    } catch (e) {
      console.error('Design weekly load error:', e);
    }

    if (!designWeeklyState.mergedData) {
      page.innerHTML = '<div style="text-align:center;padding:60px 0;color:#888;">暂无 Design Weekly 数据。</div>';
    }
    return designWeeklyState.mergedData;
  })();

  return designWeeklyState.bootstrapPromise;
}

async function loadDesignWeekly() {
  return initDesignWeekly();
}

async function fetchViaLocalProxy(url) {

async function fetchPageContent(url) {

  ];

      if (resp.ok) return await resp.text();
    } catch(e) { /* try next */ }
  }
  return null;
}

function extractFromHtml(html) {
  var doc = new DOMParser().parseFromString(html, 'text/html');
  var title = '';
  var ogTitle = doc.querySelector('meta[property="og:title"]');
  if (ogTitle) title = ogTitle.getAttribute('content');
  if (!title) { var t = doc.querySelector('title'); if (t) title = t.textContent; }
  title = (title || '').trim();

  var desc = '';
  var ogDesc = doc.querySelector('meta[property="og:description"]');
  if (ogDesc) desc = ogDesc.getAttribute('content');
  if (!desc) { var md = doc.querySelector('meta[name="description"]'); if (md) desc = md.getAttribute('content'); }

  var body = doc.body;
  if (body) {
    body.querySelectorAll('script,style,nav,footer,header,aside,.sidebar,.nav,.footer,.header,.ad,.ads,.comment,.comments').forEach(function(el) { el.remove(); });
  }
  var bodyText = (body ? body.textContent : '').replace(/\s+/g, ' ').trim();

  var keywords = '';
  var mk = doc.querySelector('meta[name="keywords"]');
  if (mk) keywords = mk.getAttribute('content');

  return { title: title, description: (desc || '').trim(), bodyText: bodyText.slice(0, 3000), keywords: (keywords || '').trim() };
}

function generateSummaryAndTags(extracted, hostname) {
  var title = extracted.title || ('来自 ' + hostname + ' 的文章');
  var summary = extracted.description;
  if (!summary || summary.length < 30) {
    summary = (extracted.bodyText || '').slice(0, 300).trim();
    if (summary.length >= 295) summary += '...';
  }
  if (!summary) summary = '暂未提取到内容摘要。';

  var tags = [];
  if (extracted.keywords) {
    tags = extracted.keywords.split(/[,，、;；]/).map(function(t) { return t.trim(); }).filter(Boolean).slice(0, 3);
  }
  if (tags.length === 0) {
    ['AI','大模型','LLM','GPT','Claude','Gemini','输入法','设计','产品','技术','开源','发布'].forEach(function(kw) {
      if ((title + ' ' + summary).indexOf(kw) >= 0 && tags.length < 3) tags.push(kw);
    });
  }
  tags.push(hostname);
  tags = tags.slice(0, 4);
  return { title: title, summary: summary, tags: tags };
}

async function checkUrlExists(url) {
  try {
    var resp = await supaFetch('?url=eq.' + encodeURIComponent(url) + '&select=id&limit=1', { method: 'GET' });
    if (resp.ok) {
      var rows = await resp.json();
      return rows.length > 0;
    }
  } catch(e) {}
  return false;
}

async function analyzeKnowledgeUrl() {
  var input = document.getElementById('knowledgeUrlInput');
  var url = (input.value || '').trim();
  showKnowledgeError('');

  if (!url) { showKnowledgeError('请输入一个链接'); return; }
  if (!/^https?:\/\/.+/i.test(url)) { showKnowledgeError('请输入有效的 http/https 链接'); return; }

  setAnalyzeLoading(true);

  try {
    // 去重检查
    var exists = await checkUrlExists(url);
    if (exists) {
      showKnowledgeError('这个链接已经添加过了');
      setAnalyzeLoading(false);
      return;
    }

    var hostname = '';
    try { hostname = new URL(url).hostname.replace(/^www\./, ''); } catch(e) {}

    var title, summary, tags;

    // 1. 优先走本地代理（支持微信公众号 + AI 总结）
    var proxyResult = await fetchViaLocalProxy(url);
    if (proxyResult) {
      title = proxyResult.title || ('来自 ' + hostname + ' 的文章');
      // 用 AI 总结的 summary
      summary = proxyResult.summary || proxyResult.description || '';
      if (!summary || summary.length < 20) {
        summary = (proxyResult.body_text || '').slice(0, 300).trim();
        if (summary.length >= 295) summary += '...';
      }
      // AI insight 拼到 summary 后面，用分隔符
      var insight = proxyResult.insight || '';
      if (insight) {
        summary = summary + '\n\n' + insight;
      }
      if (!summary) summary = '暂未提取到内容摘要。';

      // 文章发布时间（存到 source 字段后面，用 | 分隔）
      var publishTime = proxyResult.publish_time || '';

      // 优先用 AI 返回的 tags
      tags = proxyResult.tags || [];
      if (!tags.length && proxyResult.keywords) {
        tags = proxyResult.keywords.split(/[,，、;；]/).map(function(t) { return t.trim(); }).filter(Boolean).slice(0, 3);
      }
      if (!tags.length) {
        ['AI','大模型','LLM','GPT','Claude','Gemini','输入法','设计','产品','技术','开源','发布'].forEach(function(kw) {
          if ((title + ' ' + summary).indexOf(kw) >= 0 && tags.length < 3) tags.push(kw);
        });
      }
      tags.push(hostname);
      tags = tags.slice(0, 4);

      // source 里带上发布时间
      var sourceVal = publishTime ? (hostname + '|' + publishTime) : hostname;
    } else {
      // 2. 降级：CORS 代理 + 前端解析
      var html = await fetchPageContent(url);
      if (html) {
        var extracted = extractFromHtml(html);
        var result = generateSummaryAndTags(extracted, hostname);
        title = result.title; summary = result.summary; tags = result.tags;
      } else {
        title = '来自 ' + hostname + ' 的文章';
        summary = '无法自动抓取内容（可能是该网站限制了访问）。点击标题可查看原文。';
        tags = [hostname || '链接'];
      }
    }

    await insertKnowledgeItem({ url: url, title: title, summary: summary, tags: tags, source: typeof sourceVal !== 'undefined' ? sourceVal : hostname });
    await refreshKnowledgeCards();
    input.value = '';
  } catch(e) {
    showKnowledgeError('添加失败：' + (e.message || '未知错误'));
  } finally {
    setAnalyzeLoading(false);
  }
}

var podcastBookmarks = []; // { idx, text, section }

function togglePodcastBookmark(idx, btn) {
  if (!blogData || !blogData.dialogue) return;
  var existing = podcastBookmarks.findIndex(function(b) { return b.idx === idx; });
  if (existing >= 0) {
    podcastBookmarks.splice(existing, 1);
    btn.classList.remove('bookmarked');
  } else {
    var msg = blogData.dialogue[idx];
    var plainText = blogStripHtml(msg.text || '');
    podcastBookmarks.push({ idx: idx, text: plainText, section: msg.section || '' });
    btn.classList.add('bookmarked');
  }
  renderPodcastBookmarks();
}

function renderPodcastBookmarks() {
  var wrap = document.getElementById('podcast-bookmarks-wrap');
  var list = document.getElementById('podcast-bookmarks-list');
  if (!wrap || !list) return;
  if (!podcastBookmarks.length) {
    wrap.classList.remove('has-items');
    list.innerHTML = '';
    return;
  }
  wrap.classList.add('has-items');
  list.innerHTML = podcastBookmarks.map(function(bm, i) {
    var label = bm.section ? '<span style="font-size:10px;font-weight:700;color:#aaa;display:block;margin-bottom:3px;">' + bm.section + '</span>' : '';
    return '<div class="podcast-bookmark-item">' +
      '<div class="bm-text">' + label + bm.text.slice(0, 120) + (bm.text.length > 120 ? '…' : '') + '</div>' +
      '<button class="podcast-bookmark-remove" title="移除" onclick="removePodcastBookmark(' + i + ')">✕</button>' +
    '</div>';
  }).join('');
}

function removePodcastBookmark(i) {
  var bm = podcastBookmarks[i];
  if (!bm) return;
  podcastBookmarks.splice(i, 1);
  // unmark button
  var row = document.getElementById('brow' + bm.idx);
  if (row) {
    var btn = row.querySelector('.blog-bookmark-btn');
    if (btn) btn.classList.remove('bookmarked');
  }
  renderPodcastBookmarks();
}

const BLOG_HOST_NAME = 'Alex';
const BLOG_GUEST_NAME = 'Mia';

// Playback state
let blogData = null;        // { data, dialogue }
let blogPlaying = false;
let blogCurrentIdx = -1;
let blogSpeed = 1.0;
let blogMuted = false;
let blogProgressTimer = null;

// Strip HTML tags for TTS input
function blogStripHtml(html) {
  return html.replace(/<[^>]+>/g, '').replace(/&nbsp;/g, ' ').replace(/&amp;/g, '&').replace(/&lt;/g, '<').replace(/&gt;/g, '>').trim();
}

function generateDialogue(data) {
  if (!data) return [];
  const msgs = [];
  const dateDisplay = data.date || '今天';

  // 开场白 (短句，确保秒级 TTS 返回)
  msgs.push({ role: 'host', text: `欢迎收听 ${dateDisplay} 的 AI Insights 播报，一起来看看今天有哪些不容错过的 AI 行业动态。` });

  // 今日速览
  if (data.daily_summary) {
    msgs.push({ role: 'host', text: `先来一个全局速览。${data.daily_summary}`, section: '📋 今日速览' });
  }

  // 深度洞察 — 每个话题拆成：标题+摘要 一段，建议 一段
  if (data.design_insights && data.design_insights.length > 0) {
    msgs.push({ role: 'host', text: `今天的深度洞察环节，一共有 ${data.design_insights.length} 个值得关注的话题。`, section: '🔍 深度洞察' });
    data.design_insights.forEach((item, idx) => {
      msgs.push({ role: 'host', text: `第 ${idx + 1} 个话题：${item.title}。${item.summary}` });
      const extras = [];
      if (item.implication) extras.push(`我的理解是：${blogStripHtml(item.implication)}`);
      if (item.action) extras.push(`建议行动：${blogStripHtml(item.action)}`);
      if (extras.length) msgs.push({ role: 'host', text: extras.join(' ') });
    });
  }

  // 需求挖掘 — 每个机会一段
  if (data.demand_mining && data.demand_mining.length > 0) {
    msgs.push({ role: 'host', text: `接下来是需求挖掘环节，看看今天发现了哪些产品机会。`, section: '💎 需求挖掘' });
    data.demand_mining.forEach((item, idx) => {
      let parts = [`第 ${idx + 1} 个机会：${item.title}，优先级：${item.priority || '中'}。`];
      if (item.pain_point) parts.push(`用户痛点：${blogStripHtml(item.pain_point)}`);
      if (item.opportunity) parts.push(`产品机会：${blogStripHtml(item.opportunity)}`);
      msgs.push({ role: 'host', text: parts.join(' ') });
    });
  }

  // 快讯速递 — 每 2 条合一段（避免单段太长）
  if (data.hot_news && data.hot_news.length > 0) {
    msgs.push({ role: 'host', text: `最后来一组快讯。`, section: '⚡ 快讯速递' });
    let batch = [];
    data.hot_news.forEach((item, i) => {
      let t = item.title;
      if (item.summary) t += '。' + blogStripHtml(item.summary);
      batch.push(t);
      if (batch.length === 2 || i === data.hot_news.length - 1) {
        msgs.push({ role: 'host', text: batch.join(' ') });
        batch = [];
      }
    });
  }

  // 结束语
  msgs.push({ role: 'host', text: `以上就是今天的全部内容，感谢收听，明天见。` });
  return msgs;
}

    <button class="blog-vol-btn" id="blogVolBtn" onclick="toggleBlogMute()">🔊</button>

</div>
<div id="blogTranscriptWrap" style="max-width:720px;margin:0 auto;">

let blogDataCache = {};

async function loadBlogForDate(dateStr) {
  stopBlog();
  const container = document.getElementById('blogContent');
  container.innerHTML = `<div class="blog-empty-state"><div class="blog-empty-icon">⏳</div><p>正在加载...</p></div>`;

  let data = blogDataCache[dateStr];
  if (!data) {
    data = await loadData(dateStr);
    if (data) blogDataCache[dateStr] = data;
  }

  if (!data) {
    container.innerHTML = `<div class="blog-empty-state"><div class="blog-empty-icon">🎙️</div><p>本周暂无数据<br>数据每天 8:00 自动更新</p></div>`;
    return;
  }

  const dialogue = generateDialogue(data);
  const dateDisplay = data.date || dateStr;
  blogData = { data, dialogue };
  blogCurrentIdx = -1;
  blogPausedAt = 0;
  renderBlogPlayer(dialogue, dateDisplay);
  // Scroll transcript to top
  document.getElementById('blogTranscriptWrap') && (document.getElementById('blogTranscriptWrap').scrollTop = 0);
}

function toggleBlogPlay() {
  if (!blogData || !blogData.dialogue.length) return;
  if (blogPlaying) {
    pauseBlog();
  } else {
    resumeBlog();
  }
}

function resumeBlog() {
  if (!blogData || !blogData.dialogue.length) return;
  blogPlaying = true;
  const btn = document.getElementById('blogPlayBtn');
  if (btn) btn.textContent = '⏸';
  updateInlineBlogIcon(true);

  if (blogCurrentIdx === -1 || blogCurrentIdx >= blogData.dialogue.length) {
    // First play or replay: set to -1 so blogAdvance() increments to 0
    blogCurrentIdx = -1;
  } else {
    // Resuming from pause: back up by 1 so blogAdvance() re-plays current segment
    blogCurrentIdx = Math.max(-1, blogCurrentIdx - 1);
  }

  startProgressTimer();
  speakCurrentUtterance();
}

function pauseBlog() {
  blogPlaying = false;
  if (blogAudioEl) blogAudioEl.pause();
  clearInterval(blogProgressTimer);
  const btn = document.getElementById('blogPlayBtn');
  if (btn) btn.textContent = '▶';
  updateInlineBlogIcon(false);
}

function stopBlog() {
  blogPlaying = false;
  blogCurrentIdx = -1;
  blogPausedAt = 0;
  clearInterval(blogProgressTimer);
  if (blogAudioEl) {
    blogAudioEl.pause();
    blogAudioEl = null;
  }
  // Revoke blob URLs in cache
  Object.values(blogPreloadCache).forEach(item => {
    if (item && item.revoke) URL.revokeObjectURL(item.url);
  });
  blogPreloadCache = {};
  const btn = document.getElementById('blogPlayBtn');
  if (btn) btn.textContent = '▶';
  // Clear highlights
  document.querySelectorAll('.blog-episode-row').forEach(el => el.classList.remove('current'));
  document.querySelectorAll('.blog-speaker-chip').forEach(el => { el.classList.remove('active', 'speaking'); });
  const fill = document.getElementById('blogProgressFill');
  if (fill) fill.style.width = '0%';
  const cur = document.getElementById('blogCurTime');
  if (cur) cur.textContent = '0:00';
  // Reset inline blog icon
  updateInlineBlogIcon(false);
}

function replayBlog() {
  stopBlog();
  if (blogData && blogData.dialogue.length > 0) {
    setTimeout(() => resumeBlog(), 100);
  }
}

// Blog audio: uses MiniMax TTS (your cloned voice)
// Audio element + preloading for gapless transitions
let blogAudioEl = null;       // currently playing Audio element
let blogPreloadCache = {};    // idx -> { url, revoke }
let blogPreloadTimer = null;

function blogPreload(idx) {
  if (!blogData || idx >= blogData.dialogue.length) return;
  if (blogPreloadCache[idx]) return; // already cached
  // 先尝试预生成音频
  const dateStr = blogData.data.date || formatDate(currentDate);
  const pregenUrl = getPregenAudioUrl(dateStr, idx);
  if (pregenUrl) {
    blogPreloadCache[idx] = { url: pregenUrl, revoke: false };
    return;
  }
  const msg = blogData.dialogue[idx];
  const text = blogStripHtml(msg.text);
  if (!text) return;
  const blobData = { data: blogData.data, date: blogData.data.date };
  // fallback: 实时 TTS
  requestCustomVoiceAudio(text, blobData, 'alex').then(result => {
    blogPreloadCache[idx] = { url: result.url, revoke: result.revokeAfterPlay };
  }).catch(() => { /* silently skip preload failure */ });
}

function blogPlayUrl(url, idx) {
  if (blogAudioEl) {
    blogAudioEl.pause();
    blogAudioEl = null;
  }
  if (!url) {
    blogAdvance();
    return;
  }
  blogAudioEl = new Audio(url);
  blogAudioEl.volume = blogMuted ? 0 : 1;

  const msg = blogData.dialogue[idx];
  // Highlight current row
  document.querySelectorAll('.blog-episode-row').forEach(el => el.classList.remove('current'));
  document.querySelectorAll('.blog-speaker-chip').forEach(el => { el.classList.remove('active', 'speaking'); });
  const row = document.getElementById('brow' + idx);
  if (row) {
    row.classList.add('current');
    row.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }

  blogAudioEl.onended = () => {
    blogAdvance();
  };
  blogAudioEl.onerror = () => {
    blogAdvance();
  };

  try {
    blogAudioEl.playbackRate = blogSpeed;
    const playPromise = blogAudioEl.play();
    if (playPromise && typeof playPromise.catch === 'function') {
      playPromise.catch(err => {
        console.warn('Audio play blocked:', err);
        // Autoplay policy: retry once on next user gesture is not possible here,
        // so advance to trigger next segment
        blogAdvance();
      });
    }
  } catch(e) {
    console.warn('Audio play error:', e);
    blogAdvance();
  }
}

function blogAdvance() {
  if (!blogPlaying || !blogData) return;
  blogCurrentIdx++;
  if (blogCurrentIdx >= blogData.dialogue.length) {
    stopBlog();
    // Also close inline player if visible
    closeInlineBlog();
    return;
  }
  // Preload next two segments
  blogPreload(blogCurrentIdx);
  blogPreload(blogCurrentIdx + 1);
  blogPreload(blogCurrentIdx + 2);
  const cached = blogPreloadCache[blogCurrentIdx];
  if (cached) {
    blogPlayUrl(cached.url, blogCurrentIdx);
  } else {
    // Not preloaded — try pre-generated audio first, then TTS
    const dateStr = blogData.data.date || formatDate(currentDate);
    const pregenUrl = getPregenAudioUrl(dateStr, blogCurrentIdx);
    if (pregenUrl) {
      blogPreloadCache[blogCurrentIdx] = { url: pregenUrl, revoke: false };
      blogPlayUrl(pregenUrl, blogCurrentIdx);
    } else {
      const msg = blogData.dialogue[blogCurrentIdx];
      const text = blogStripHtml(msg.text);
      const blobData = { data: blogData.data, date: blogData.data.date };
      requestCustomVoiceAudio(text, blobData, 'alex').then(result => {
        blogPlayUrl(result.url, blogCurrentIdx);
      }).catch(err => {
        console.error('[Podcast] TTS request failed for segment', blogCurrentIdx, err);
        blogCurrentIdx++;
        blogAdvance();
      });
    }
  }
}

function speakCurrentUtterance() {
  // Called only for the very first utterance to kick off playback
  if (!blogPlaying || !blogData) return;
  blogAdvance();
}

function startProgressTimer() {
  clearInterval(blogProgressTimer);
  blogProgressTimer = setInterval(() => {
    if (!blogPlaying || !blogData) return;
    const total = blogData.dialogue.length;
    const idx = blogCurrentIdx;
    const pct = total > 0 ? Math.round((idx / total) * 100) : 0;
    const fill = document.getElementById('blogProgressFill');
    if (fill) fill.style.width = pct + '%';
    const cur = document.getElementById('blogCurTime');
    if (cur) cur.textContent = `${Math.min(idx + 1, total)}/${total}`;
    // Also update inline player
    updateInlineProgress();
  }, 300);
}

function seekBlog(e) {
  if (!blogData || !blogData.dialogue.length) return;
  const bar = document.getElementById('blogProgressBar');
  if (!bar) return;
  const rect = bar.getBoundingClientRect();
  const ratio = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  const targetIdx = Math.round(ratio * blogData.dialogue.length);
  const wasPlaying = blogPlaying;
  pauseBlog();
  blogCurrentIdx = Math.max(0, Math.min(targetIdx, blogData.dialogue.length - 1));
  if (wasPlaying) {
    setTimeout(() => {
      blogPlaying = true;
      const btn = document.getElementById('blogPlayBtn');
      if (btn) btn.textContent = '⏸';
      startProgressTimer();
      speakCurrentUtterance();
    }, 100);
  }
}

function cycleBlogSpeed() {
  const speeds = [0.75, 1.0, 1.25, 1.5];
  const idx = speeds.indexOf(blogSpeed);
  blogSpeed = speeds[(idx + 1) % speeds.length];
  const btn = document.getElementById('blogSpeedBtn');
  if (btn) btn.textContent = blogSpeed + '×';
  if (blogAudioEl) blogAudioEl.playbackRate = blogSpeed;
}

function toggleBlogMute() {
  blogMuted = !blogMuted;
  if (blogAudioEl) blogAudioEl.volume = blogMuted ? 0 : 1;
  const btn = document.getElementById('blogVolBtn');
  if (btn) btn.textContent = blogMuted ? '🔇' : '🔊';
}

// Keyboard shortcuts for blog player (works on both blog and insight pages)
document.addEventListener('keydown', function(e) {
  if (currentMainPage !== 'blog' && currentMainPage !== 'insight') return;
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.code === 'Space' && blogPlaying) {
    e.preventDefault();
    toggleBlogPlay();
  }
});

// ===== INLINE BLOG PLAYER (embedded in Insight hero section) =====
let inlineBlogLoading = false;

async function toggleInlineBlog() {
  const icon = document.getElementById('inlineBlogIcon');
  if (!icon) return;

  // If already playing, pause
  if (blogPlaying) {
    pauseBlog();
    return;
  }

  // If paused but has data (was playing before), resume
  if (!blogPlaying && blogData && blogCurrentIdx >= 0) {
    resumeBlog();
    return;
  }

  // First time — load data and start
  if (inlineBlogLoading) return;
  inlineBlogLoading = true;

  // Show loading state on button text only (no opacity change)
  const subtitle = document.getElementById('inlineBlogSub');
  const origSubText = subtitle ? subtitle.textContent : '';
  if (subtitle) subtitle.textContent = '加载中...';

  try {
    const dateStr = formatDate(currentDate);
    let data = blogDataCache[dateStr];
    if (!data) {
      data = await loadData(dateStr);
      if (data) blogDataCache[dateStr] = data;
    }

    if (!data) {
      inlineBlogLoading = false;
      if (subtitle) subtitle.textContent = origSubText;
      return;
    }

    const dialogue = generateDialogue(data);
    blogData = { data, dialogue };
    blogCurrentIdx = -1;
    blogPausedAt = 0;

    // 先尝试加载预生成音频
    const manifest = await loadAudioManifest(dateStr);
    if (manifest && manifest.segments && manifest.segments.length > 0) {
      // 有预生成音频 → 直接填充缓存，秒播
      for (let i = 0; i < dialogue.length; i++) {
        const url = getPregenAudioUrl(dateStr, i);
        if (url) {
          blogPreloadCache[i] = { url: url, revoke: false };
        }
      }
      window._preloadReady = true;
    } else if (!blogPreloadCache[0]) {
      // 无预生成音频 → 走 TTS 预加载
      // Trigger preload if not started yet
      if (!window._preloadReady && !window._preloadTotal) {
        preloadBlogSegments(data);
      }
      // Wait up to 4s for preload to finish segment 0
      const cached = await new Promise((resolve) => {
        let waited = 0;
        const check = setInterval(() => {
          waited += 100;
          if (blogPreloadCache[0]) {
            clearInterval(check);
            resolve(true);
          } else if (waited >= 4000) {
            clearInterval(check);
            resolve(false);
          }
        }, 100);
      });
      // If still not cached, fire a direct request for segment 0
      if (!cached && !blogPreloadCache[0]) {
        try {
          const text0 = blogStripHtml(dialogue[0].text);
          const blobData = { data: data, date: data.date };
          const result = await requestCustomVoiceAudio(text0, blobData, 'alex');
          blogPreloadCache[0] = { url: result.url, revoke: result.revokeAfterPlay };
        } catch(e) {
          console.error('[Podcast] Direct TTS for segment 0 failed:', e);
        }
      }
    }

    if (subtitle) subtitle.textContent = origSubText;

    // Start playback
    resumeBlog();
  } catch(e) {
    console.error('Inline blog load error:', e);
    if (subtitle) subtitle.textContent = origSubText;
  }
  inlineBlogLoading = false;
}

function closeInlineBlog() {
  stopBlog();
  updateInlineBlogIcon(false);
}

function updateInlineBlogIcon(playing) {
  const icon = document.getElementById('inlineBlogIcon');
  if (!icon) return;
  if (playing) {
    icon.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg>';
  } else {
    icon.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><polygon points="6,4 20,12 6,20"/></svg>';
  }
}
